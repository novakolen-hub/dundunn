<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0e14">
<title>V9 Trading Dashboard v11.8.3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0b0e14;color:#c4cad4;font-family:'DM Sans',-apple-system,sans-serif;font-size:14px;line-height:1.55;padding:12px;max-width:720px;margin:0 auto;-webkit-text-size-adjust:100%}
  h1{font-family:'JetBrains Mono',monospace;color:#58a6ff;font-size:17px;letter-spacing:-0.3px;padding-bottom:8px;margin-bottom:10px;border-bottom:1px solid #1c2333}
  h2{color:#e6edf3;font-size:15px;font-weight:700;margin-top:22px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  h2::before{content:'';width:3px;height:16px;background:#58a6ff;border-radius:2px;flex-shrink:0}
  h3{color:#7d8590;font-size:11px;font-weight:700;margin-top:14px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
  p{margin-bottom:8px}a{color:#58a6ff;text-decoration:none}
  .g{color:#3fb950}.r{color:#f85149}.y{color:#e3b341}.b{color:#58a6ff}.dim{color:#7d8590}.bold{font-weight:700}.white{color:#e6edf3}
  .mono{font-family:'JetBrains Mono',monospace}
  .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
  .tag-gp{font-family:'JetBrains Mono',monospace;font-size:13px;padding:5px 14px;border-radius:6px}
  .tag-gp-a{background:#0d2818;color:#00C853;border:1px solid #00C853}
  .tag-gp-b{background:#0d1a2e;color:#2196F3;border:1px solid #2196F3}
  .tag-gp-c{background:#1f1a0f;color:#FF9800;border:1px solid #FF9800}
  .tag-gp-d{background:#1f1315;color:#F44336;border:1px solid #F44336}
  .tag-live{background:#0d2818;color:#3fb950;border:1px solid #238636;font-size:10px;padding:1px 6px}
  .tag-acct{background:#161b22;color:#7d8590;border:1px solid #30363d;font-size:10px;padding:1px 6px}
  .gp-box{background:linear-gradient(135deg,#0f1923 0%,#131d2b 100%);border:1px solid #1c2333;padding:14px 16px;border-radius:8px;margin-bottom:6px}
  .story-box{background:#0f1318;border-left:3px solid #58a6ff;padding:12px 16px;margin:8px 0;border-radius:0 6px 6px 0;font-size:13px;line-height:1.7}
  .info-box{background:#0f1318;border:1px solid #1c2333;padding:12px 16px;border-radius:6px;margin:8px 0}
  .warn-box{background:#1f1315;border-left:3px solid #f85149;padding:10px 16px;margin:8px 0;border-radius:0 6px 6px 0}
  .alert-box{background:#0f1318;border-left:3px solid #e3b341;padding:10px 16px;margin:8px 0;border-radius:0 6px 6px 0;font-size:13px}
  .heat-box{background:#0f1318;border-left:3px solid #3fb950;padding:10px 16px;margin:8px 0;border-radius:0 6px 6px 0;font-size:13px}
  .learn-box{background:#13111a;border-left:3px solid #d2a8ff;padding:14px 16px;border-radius:0 8px 8px 0;margin:8px 0}
  .coaching{color:#d2a8ff;font-style:italic;font-size:13px}
  .risk-card{background:#0f1318;border:1px solid #1c2333;border-radius:8px;padding:12px 16px;margin:8px 0}
  table{width:100%;border-collapse:collapse;margin:6px 0 10px 0;font-size:13px}
  th{background:#0f1318;color:#7d8590;text-align:left;padding:5px 8px;border-bottom:1px solid #1c2333;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
  td{padding:5px 8px;border-bottom:1px solid #161b22;vertical-align:top}
  tr:hover{background:#0f1318}.tc{white-space:nowrap}
  .heatmap{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:8px 0}
  .hm-hot2,.hm-hot1,.hm-flat,.hm-cold1,.hm-cold2,.hm-cold3{padding:8px 6px;border-radius:4px;text-align:center;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
  .hm-hot2{background:#0a2e15;color:#56d364}.hm-hot1{background:#0a2610;color:#7ee787}.hm-flat{background:#161b22;color:#7d8590}
  .hm-cold1{background:#1f1315;color:#ffa198}.hm-cold2{background:#2c1519;color:#f85149}.hm-cold3{background:#3d1519;color:#ff7b72}
  .tracker{display:flex;gap:3px;align-items:flex-end;margin:6px 0;height:28px}
  .tracker-bar{flex:1;border-radius:2px 2px 0 0;min-width:16px;position:relative}
  .score-big{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700}
  .divider{border:0;border-top:1px solid #1c2333;margin:20px 0}
  .tag-sub{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;font-weight:700;letter-spacing:0.3px}
  .tag-sub-improving{background:#0d2818;color:#56d364;border:1px solid #238636}
  .tag-sub-stable{background:#161b22;color:#7d8590;border:1px solid #30363d}
  .tag-sub-fading{background:#1f1315;color:#ffa198;border:1px solid #f85149}
  .tag-sub-choppy{background:#1a1a0f;color:#e3b341;border:1px solid #e3b341}
  .traj-arrow{font-size:14px;margin-left:2px}
  .traj-up{color:#56d364}.traj-down{color:#f85149}.traj-flat{color:#7d8590}.traj-chop{color:#e3b341}
  .inplay-card{background:#0f1318;border:1px solid #1c2333;border-radius:6px;padding:8px 12px;margin:4px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .inplay-reason{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;font-family:'JetBrains Mono',monospace}
  .reason-gap{background:#1a0d2e;color:#d2a8ff;border:1px solid #6e40c9}
  .reason-rvol{background:#0d2818;color:#56d364;border:1px solid #238636}
  .reason-catalyst{background:#1f1a0f;color:#e3b341;border:1px solid #9e6a03}
  .reason-newsvol{background:#0a2e15;color:#3fb950;border:1px solid #238636}
  .q-aplus{color:#56d364}.q-solid{color:#58a6ff}.q-playbook{color:#e3b341}.q-watch{color:#7d8590}.q-skip{color:#484f58}
  .footer{text-align:center;color:#30363d;font-size:11px;margin-top:24px;font-family:'JetBrains Mono',monospace}
  .pos-block{background:#151b23;border:1px solid #2a313a;border-radius:6px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:background .15s,border-color .15s,box-shadow .15s}
  .pos-block.card-focus{background:#f5f0e8!important;border:2px solid #8b7355!important;border-radius:8px;margin:4px 0;padding:12px!important;box-shadow:0 0 12px rgba(139,115,85,0.25)}
  .pos-block.card-focus,.pos-block.card-focus span,.pos-block.card-focus p,.pos-block.card-focus a,.pos-block.card-focus div{color:#2c1810!important}
  .pos-block.card-focus .dim,.pos-block.card-focus .inst-hint{color:#6b5744!important;font-weight:400}
  .pos-block.card-focus .bold{font-weight:700!important}
  .pos-block.card-focus .g{color:#1a6b2a!important}.pos-block.card-focus .r{color:#b91c1c!important}.pos-block.card-focus .y{color:#92600a!important}.pos-block.card-focus .b{color:#1e4d8c!important}
  .pos-block.card-focus .tag{background:#e8dcc8!important;color:#5c4033!important;border-color:#b8a080!important;font-weight:600!important}
  .pos-block.card-focus div[style*="background"]{background:#ebe4d4!important;border-color:#c4b49a!important}
  .pos-block.card-focus .pos-news-link{color:#1e4d8c!important;font-weight:500!important}
  .pos-block.card-focus .mono{color:#2c1810!important}
  .pos-block.card-focus textarea{background:#ebe4d4!important;border-color:#c4b49a!important;color:#2c1810!important}
  .pos-block.card-focus svg path{stroke:#5c4033!important}
  .gauge{display:flex;align-items:center;gap:8px;margin:4px 0}
  .gauge-bar{flex:1;height:8px;background:#161b22;border-radius:4px;overflow:hidden}
  .gauge-fill{height:100%;border-radius:4px}
  .gauge-label{font-size:11px;font-family:'JetBrains Mono',monospace;min-width:40px;text-align:right}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#161b22;border-radius:6px;font-size:11px;margin-bottom:8px}
  .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
  .pulse-live{background:#3fb950;animation:blink 2s infinite}.pulse-stale{background:#e3b341}.pulse-off{background:#f85149}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
  .news-item{padding:8px 10px;border-bottom:1px solid #161b22}
  .news-item a{color:#e6edf3;font-size:13px;line-height:1.5}.news-item a:hover{color:#58a6ff}
  .news-meta{font-size:11px;color:#7d8590;margin-top:3px}.news-src{color:#58a6ff}.news-time{margin-left:6px}.news-item.stale{opacity:0.35}.news-item.read a{color:#3d444d}.news-item.read{opacity:0.45}
  #backToTop{position:fixed;bottom:20px;right:20px;z-index:999;width:40px;height:40px;border-radius:50%;background:#161b22;border:1px solid #30363d;color:#58a6ff;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.5);transition:opacity 0.2s}#backToTop:hover{background:#1c2333;border-color:#58a6ff}
  /* ── Sizing badge (GP banner) ── */
  .size-badge{display:inline-block;padding:2px 9px;border-radius:11px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.2px;vertical-align:middle;margin-left:6px}
  .sb-full{background:rgba(0,200,83,0.12);color:#00c853;border:1px solid rgba(0,200,83,0.2)}
  .sb-standard{background:rgba(66,165,245,0.12);color:#42a5f5;border:1px solid rgba(66,165,245,0.2)}
  .sb-reduce{background:rgba(255,193,7,0.12);color:#ffc107;border:1px solid rgba(255,193,7,0.2)}
  .sb-caution{background:rgba(255,193,7,0.12);color:#ffc107;border:1px solid rgba(255,193,7,0.2)}
  .sb-small{background:rgba(255,152,0,0.12);color:#ff9800;border:1px solid rgba(255,152,0,0.25)}
  .sb-bench{background:rgba(239,83,80,0.12);color:#ef5350;border:1px solid rgba(239,83,80,0.2)}
  .sb-inverse{background:rgba(171,71,188,0.12);color:#ab47bc;border:1px solid rgba(171,71,188,0.2)}
  /* ── Active setups bar ── */
  .as-bar{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:10px 14px;margin:6px 0 2px}
  .as-bar .as-hdr{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6e7590;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px}
  .as-pills{display:flex;flex-wrap:wrap;gap:5px}
  .as-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;cursor:default;transition:opacity 0.15s}
  .as-pill.as-ok{background:rgba(0,200,83,0.1);color:#00c853;border:1px solid rgba(0,200,83,0.2)}
  .as-pill.as-warn{background:rgba(255,193,7,0.1);color:#ffc107;border:1px solid rgba(255,193,7,0.2)}
  .as-pill.as-off{background:#0d1117;color:#3d4455;border:1px solid #1c2030;text-decoration:line-through;opacity:0.5}
  .as-pill .as-ct{background:rgba(255,255,255,0.08);border-radius:8px;padding:0 5px;font-size:9px;margin-left:2px}
  .as-blocked{font-size:11px;color:#3d4455;margin-top:5px;font-style:italic}
  /* ── Setup label on ticker cards ── */
  .setup-tag{display:inline-block;padding:1px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.15px;vertical-align:middle;margin-left:4px}
  .st-ok{background:rgba(0,200,83,0.1);color:#00c853;border:1px solid rgba(0,200,83,0.18)}
  .st-warn{background:rgba(255,193,7,0.1);color:#ffc107;border:1px solid rgba(255,193,7,0.18)}
  .st-off{background:#0d1117;color:#3d4455;border:1px solid #1c2030;text-decoration:line-through;opacity:0.45}
  /* ── Pre-Trade Modal ── */
  .pt-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:9000;display:none;align-items:flex-start;justify-content:center;padding:24px 12px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .pt-overlay.open{display:flex}
  .pt-modal{background:#0d1117;border:1px solid #30363d;border-radius:12px;width:100%;max-width:520px;padding:0;box-shadow:0 16px 48px rgba(0,0,0,0.6);animation:ptSlide .25s ease}
  @keyframes ptSlide{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
  .pt-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #21262d}
  .pt-hdr h3{font-family:'JetBrains Mono',monospace;font-size:15px;color:#e6edf3;margin:0}
  .pt-close{background:none;border:none;color:#7d8590;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px}
  .pt-close:hover{background:#21262d;color:#e6edf3}
  .pt-body{padding:14px 18px}
  .pt-section{margin-bottom:14px}
  .pt-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#6e7590;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px}
  .pt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .pt-stat{background:#161b22;border:1px solid #21262d;border-radius:6px;padding:6px 10px;text-align:center}
  .pt-stat .v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#e6edf3}
  .pt-stat .k{font-size:9.5px;color:#6e7590;text-transform:uppercase;margin-top:1px}
  .pt-checks{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .pt-chk{background:#161b22;border:1px solid #21262d;border-radius:5px;padding:5px 10px;font-size:11.5px;display:flex;justify-content:space-between;align-items:center}
  .pt-chk .chk-name{color:#8b949e}.pt-chk .chk-val{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:10.5px}
  .chk-g{color:#00c853}.chk-y{color:#ffc107}.chk-r{color:#ef5350}
  .pt-pass-bar{height:6px;border-radius:3px;background:#21262d;overflow:hidden;margin:6px 0}
  .pt-pass-fill{height:100%;border-radius:3px;transition:width .3s ease}
  .pt-input-row{display:flex;gap:8px;margin-bottom:8px}
  .pt-input{background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:7px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:13px;width:100%;text-align:center}
  .pt-input:focus{outline:none;border-color:#58a6ff}
  .pt-input::placeholder{color:#3d4455}
  .pt-select{background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:7px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;width:100%;cursor:pointer}
  .pt-sizing{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:12px 14px;margin-top:8px}
  .pt-sz-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
  .pt-sz-row .lbl{color:#8b949e}.pt-sz-row .val{font-family:'JetBrains Mono',monospace;font-weight:600;color:#e6edf3}
  .pt-btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:8px;transition:background .15s}
  .pt-btn:hover{background:#2ea043}
  .pt-btn:disabled{background:#21262d;color:#484f58;cursor:not-allowed}
  .pt-loading{text-align:center;padding:40px;color:#6e7590;font-size:13px}
  /* ── Trade Grade on cards ── */
  .tg{display:inline-flex;align-items:center;justify-content:center;width:22px;height:18px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;margin-left:4px;vertical-align:middle}
  .tg-a{background:rgba(0,200,83,0.15);color:#00c853;border:1px solid rgba(0,200,83,0.25)}
  .tg-b{background:rgba(66,165,245,0.12);color:#42a5f5;border:1px solid rgba(66,165,245,0.2)}
  .tg-c{background:rgba(255,152,0,0.12);color:#ff9800;border:1px solid rgba(255,152,0,0.2)}
  .tg-f{background:rgba(239,83,80,0.12);color:#ef5350;border:1px solid rgba(239,83,80,0.2)}
  /* ── Trade Candidates section ── */
  .tc-section{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:10px 14px;margin:6px 0 4px}
  .tc-hdr{font-family:'JetBrains Mono',monospace;font-size:11px;color:#e3b341;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px}
  .tc-card{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#161b22;border:1px solid #21262d;border-radius:6px;margin-bottom:4px;cursor:pointer;transition:border-color .15s}
  .tc-card:hover{border-color:#58a6ff}
  .tc-tk{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#e6edf3;min-width:55px}
  .tc-setup{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:10px}
  .tc-meta{font-size:11px;color:#8b949e;flex:1}
  .tc-grade{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
  .tc-empty{font-size:12px;color:#3d4455;font-style:italic;padding:4px 0}
  /* ── Arete Emails ── */
  .ae-day{background:#161b22;border:1px solid #9e6a0340;border-radius:6px;margin-bottom:6px;overflow:hidden}
  .ae-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;cursor:pointer;user-select:none}
  .ae-hdr:hover{background:#1c2030}
  .ae-hdr .ae-day-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:#e3b341;font-weight:600}
  .ae-hdr .ae-subj{font-size:12px;color:#8b949e;margin-left:8px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ae-hdr .ae-arrow{color:#6e7590;font-size:10px;transition:transform .2s}
  .ae-body{padding:10px 14px;font-size:12.5px;line-height:1.7;color:#c8cdd8;white-space:pre-wrap;word-break:break-word;border-top:1px solid #21262d;max-height:400px;overflow-y:auto}
  .ae-ticker{color:#58a6ff;font-weight:700;cursor:pointer}
  .ae-ticker:hover{text-decoration:underline}
  .hot-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;background:rgba(239,83,80,0.1);color:#ef5350;border:1px solid rgba(239,83,80,0.2);animation:hotPulse 2s ease infinite}
  @keyframes hotPulse{0%,100%{opacity:1}50%{opacity:0.7}}
  /* ── Quota chart popup ── */
  .qc{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 12px;width:320px;box-shadow:0 8px 24px rgba(0,0,0,0.6)}
  .qc-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:#6e7590;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px}
  .qc-bars{display:flex;align-items:flex-end;gap:1px;height:60px}
  .qc-bar{flex:1;border-radius:2px 2px 0 0;min-width:4px;position:relative;transition:opacity .15s}
  .qc-bar:hover{opacity:0.8}
  .qc-bar:hover .qc-tip{display:block}
  .qc-tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#161b22;border:1px solid #30363d;border-radius:4px;padding:2px 6px;font-family:'JetBrains Mono',monospace;font-size:9px;color:#e6edf3;white-space:nowrap;margin-bottom:2px;z-index:10}
  .qc-axis{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:8px;color:#484f58;margin-top:2px}
  .qc-total{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:6px;text-align:center}
  .qc-log{font-family:'JetBrains Mono',monospace;font-size:9px;color:#6e7590;margin-top:6px;max-height:160px;overflow-y:auto;border-top:1px solid #21262d;padding-top:4px;line-height:1.5}
  .ratio-row{padding:6px 0;border-bottom:1px solid #161b22}
  @media(max-width:480px){body{padding:8px;font-size:13px}.heatmap{grid-template-columns:repeat(3,1fr)}table{font-size:12px}.inst-grid{grid-template-columns:1fr !important}}

<script>
var EP='https://script.google.com/macros/s/AKfycbyA45O4vPIEOTdOW601PmdkdnOpTDSzu44qaSPq-PDBhElHlzThmyqdvD8MO7IZqmLq/exec';
var _d,_n=0,_e=0;

// ══════════════════════════════════════════════════════════════
// CLIENT-SIDE SETUP REGISTRY (mirrors v90.9 SETUP_REGISTRY)
// Used for: active setups bar, setup labels on cards, GP filtering
// ══════════════════════════════════════════════════════════════
var C_REGISTRY={
  'VWAP-Hold':      {label:'VWAP Hold',             validGP:['A','B','C-Recovery'],          minRVOL:1,   nature:'structure', stopATR:0.15, rr:3, scale:'Nibble→add on turn→trail'},
  'OR-Break':       {label:'OR Break',               validGP:['A','B'],                       minRVOL:1.5, nature:'breakout',  stopATR:0.20, rr:3, scale:'50% at 1R, trail rest above OR'},
  'Pullback-EMA':   {label:'Pullback EMA',           validGP:['A','B','C-Recovery'],          minRVOL:1,   nature:'structure', stopATR:0.15, rr:3, scale:'50% at prior high, trail w/ EMA9'},
  'Momentum':       {label:'Momentum',               validGP:['A','B'],                       minRVOL:2,   nature:'momentum',  stopATR:0.15, rr:3, scale:'Add on higher lows, sell into spike'},
  'Failed-BD':      {label:'Failed BD',              validGP:['A','B','C-Recovery'],          minRVOL:1,   nature:'structure', stopATR:0.15, rr:3, scale:'50% at opposite edge, trail rest'},
  'RS-Override':    {label:'RS Override',             validGP:['A','B','C-Recovery','C','D'],  minRVOL:2,   nature:'any',       stopATR:0.10, rr:3, scale:'Tight stops, 33% at 1R/2R/trail'},
  'Rotation-ETF':   {label:'Rotation ETF',           validGP:['A','B','C-Recovery','D'],      minRVOL:0,   nature:'any',       stopATR:0.20, rr:2, scale:'50% at 1R, trail rest'},
  'BigDog':         {label:'Big Dog',                validGP:['A','B'],                       minRVOL:3,   nature:'momentum',  stopATR:0.20, rr:5, scale:'33% at 1R, 33% at 2R, trail'},
  'BigDogBounce':   {label:'BigDog Bounce',          validGP:['A','B','C-Recovery'],          minRVOL:2,   nature:'structure', stopATR:0.15, rr:3, scale:'50% at VWAP, trail above'},
  'GapGo':          {label:'Gap & Go',               validGP:['A','B'],                       minRVOL:2,   nature:'momentum',  stopATR:0.20, rr:5, scale:'33% at 1R, hold runner for multi-day'},
  'DailyBreakout':  {label:'Daily Breakout',         validGP:['A','B'],                       minRVOL:3,   nature:'breakout',  stopATR:0.20, rr:3, scale:'33% at 1R, 33% at measured move, trail'},
  'OpeningDrive':   {label:'Opening Drive',          validGP:['A','B'],                       minRVOL:1.5, nature:'momentum',  stopATR:0.05, rr:10,scale:'Sell into spike, done in 2 min'},
  'MarketPlay':     {label:'Market Play',            validGP:['A','B','C-Recovery','D'],      minRVOL:1.5, nature:'any',       stopATR:0.20, rr:3, scale:'50% core holds, 50% trades ebb/flow'},
  'SecondDay':      {label:'Second Day',             validGP:['A','B'],                       minRVOL:1.5, nature:'momentum',  stopATR:0.15, rr:3, scale:'25-50% at level, rest on breakout'},
  'ReturnPullback': {label:'Return Pullback',        validGP:['A','B','C-Recovery'],          minRVOL:1,   nature:'structure', stopATR:0.15, rr:3, scale:'100% at opposite zone edge'},
  'Scalping':       {label:'Scalping',               validGP:['A','B','D'],                   minRVOL:1,   nature:'any',       stopATR:0.05, rr:2, scale:'Full size in, full size out — seconds'}
};

// Caution combos: sub-mode + setup = allowed but YELLOW
var _CAUTION_MAP={
  'A-Cooling':['Momentum','GapGo'],
  'A-Choppy':['Momentum','GapGo','BigDog'],
  'B-Weakening':['OR-Break','DailyBreakout','BigDog','SecondDay','OpeningDrive'],
  'B-Choppy':['OR-Break','DailyBreakout','BigDog']
};

// Check if setup is allowed for current sub-mode
// Returns {ok:bool, caution:bool, reason:string}
function _cSGP(setupKey,subModeLabel,gpLetter){
  var r=C_REGISTRY[setupKey];
  if(!r||!r.validGP)return{ok:true,caution:false,reason:''};
  var vg=r.validGP;
  // Exact sub-mode match
  if(vg.indexOf(subModeLabel)>=0)return{ok:true,caution:false,reason:subModeLabel+' supports '+r.label};
  // Base letter match
  if(vg.indexOf(gpLetter)>=0){
    var cl=_CAUTION_MAP[subModeLabel]||[];
    if(cl.indexOf(setupKey)>=0)return{ok:true,caution:true,reason:subModeLabel+': '+r.label+' higher risk'};
    return{ok:true,caution:false,reason:'GP-'+gpLetter+' supports '+r.label};
  }
  return{ok:false,caution:false,reason:subModeLabel+': '+r.label+' blocked'};
}

// Sizing badge data
var _SIZE_BADGES={
  full:     {cls:'sb-full',    txt:'$15-20K'},
  standard: {cls:'sb-standard',txt:'$8-12K'},
  reduce:   {cls:'sb-reduce',  txt:'$6-9K'},
  caution:  {cls:'sb-caution', txt:'$6-9K'},
  small:    {cls:'sb-small',   txt:'$3-5K'},
  bench:    {cls:'sb-bench',   txt:'BENCH'},
  inverse:  {cls:'sb-inverse', txt:'$8-12K INV'}
};

// Build setup tag HTML for a ticker card (clickable → opens pre-trade modal)
// ═══ QUICK GRADE — lightweight client-side scorecard from _tq data ═══
function quickGrade(ticker,setupKey,subModeLabel,gpLetter,side){
  var q=_tq[ticker]||{};
  if(!q.last||!setupKey)return null;
  var reg=C_REGISTRY[setupKey];if(!reg)return null;
  side=side||'LONG';
  var g=0,y=0,r=0,notes=[];
  // 1. GP × Setup
  var c1=_cSGP(setupKey,subModeLabel,gpLetter);
  if(side==='LONG'){
    if(c1.ok&&!c1.caution)g++;else if(c1.ok&&c1.caution){y++;notes.push('GP caution');}else{r++;notes.push('GP blocked');}
  } else { if(gpLetter==='D')g++;else if(gpLetter==='C')y++;else{r++;notes.push('wrong GP for short');} }
  // 2. RVOL
  var rv=parseFloat(q.rvol)||0;var rvReq=reg.minRVOL||1;
  if(rv>=rvReq)g++;else if(rv>=rvReq*0.7){y++;notes.push('RVOL low');}else{r++;notes.push('RVOL');}
  // 3. VWAP
  var last=parseFloat(q.last)||0;var vwap=parseFloat(q.vwap)||0;
  var vd=vwap>0?((last-vwap)/vwap*100):0;
  if(side==='LONG'){if(vd>0)g++;else if(vd>-0.3)y++;else{r++;notes.push('<VWAP');}}
  else{if(vd<0)g++;else if(vd<0.3)y++;else{r++;notes.push('>VWAP');}}
  // 4. Confluence
  var cf=parseFloat(q.conf)||0;
  if(cf>=24)g++;else if(cf>=20){y++;notes.push('conf '+cf);}else{r++;notes.push('conf '+cf);}
  // 5. Session (assume valid during market hours)
  g++;
  // 6. VIX
  var vix=(_lastD&&_lastD.vix)?parseFloat(_lastD.vix):0;
  if(!vix){var vixQ=_tq['$VIX.X']||_tq['$VIX']||{};vix=parseFloat(vixQ&&vixQ.last)||15;}
  if(vix<18)g++;else if(vix<25){y++;notes.push('VIX '+vix.toFixed(0));}else{r++;notes.push('VIX high');}
  // 7. RSI
  var rsi=parseFloat(q.rsi)||50;
  if(side==='LONG'){if(rsi>=35&&rsi<=70)g++;else if(rsi>=25&&rsi<=80)y++;else{r++;notes.push('RSI');}}
  else{if(rsi>=30&&rsi<=65)g++;else if(rsi>=20&&rsi<=75)y++;else{r++;notes.push('RSI');}}
  // 8. Sector (check if we have open positions in same sector from _lastD)
  var sector=_SEC[ticker]||'';
  if(sector&&_lastD&&_lastD.positions){
    var secCount=0;for(var sc=0;sc<_lastD.positions.length;sc++){var pt=_lastD.positions[sc].ticker||'';if(_SEC[pt]===sector)secCount++;}
    if(secCount===0)g++;else if(secCount===1){y++;notes.push('1 in '+sector);}else{r++;notes.push(secCount+' in '+sector);}
  } else {g++;}
  var grade;
  // A = exceptional: 7+ green, zero reds, max 1 yellow
  if(g>=7&&r===0&&y<=1)grade='A';
  // B = solid: 6+ green, zero reds
  else if(g>=6&&r===0)grade='B';
  // C = tradeable with issues: max 1 red, 5+ green
  else if(r<=1&&g>=5)grade='C';
  // F = don't trade
  else grade='F';
  return{grade:grade,greens:g,yellows:y,reds:r,notes:notes,total:g+y+r};
}
function gradeHtml(gr){
  if(!gr)return '';
  var cls=gr.grade==='A'?'tg-a':gr.grade==='B'?'tg-b':gr.grade==='C'?'tg-c':'tg-f';
  var tip=gr.greens+'G/'+gr.yellows+'Y/'+gr.reds+'R'+(gr.notes.length?' — '+gr.notes.join(', '):'');
  return '<span class="tg '+cls+'" title="'+e(tip)+'">'+gr.grade+'</span>';
}

function setupTagHtml(setupRaw,subModeLabel,gpLetter,ticker){
  if(!setupRaw)return '';
  var key=_matchSetupKey(setupRaw);
  if(!key||!C_REGISTRY[key])return '';
  var r=C_REGISTRY[key],chk=_cSGP(key,subModeLabel,gpLetter);
  var cls=chk.ok?(chk.caution?'st-warn':'st-ok'):'st-off';
  var icon=chk.ok?(chk.caution?'△':'✓'):'✗';
  var tip=chk.reason||'';
  var onclick=ticker?' onclick="event.stopPropagation();openPT(\''+ticker+'\')" style="cursor:pointer"':'';
  var h=' <span class="setup-tag '+cls+'" title="'+e(tip)+'"'+onclick+'>'+e(r.label)+' '+icon+'</span>';
  if(ticker&&chk.ok){var gr=quickGrade(ticker,key,subModeLabel,gpLetter,'LONG');if(gr)h+=gradeHtml(gr);}
  return h;
}

// ═══ TRADE CANDIDATES — surfaces best opportunities at the top ═══
function rTradeCandidates(d){
  var el=$('sTradeCandidates');if(!el)return;
  var sm=d.gpSubMode,gp=d.gpLetter||'C';
  var subModeLabel=(sm&&sm.subMode)?sm.subMode:'';
  var tqKeys=Object.keys(_tq||{});
  var candidates=[];
  for(var i=0;i<tqKeys.length;i++){
    var tk=tqKeys[i],q=_tq[tk];
    if(!q||!q.setup||!q.last)continue;
    if(tk.charAt(0)==='$'||tk.charAt(0)==='/')continue;
    var key=_matchSetupKey(q.setup);if(!key)continue;
    var chk=_cSGP(key,subModeLabel,gp);if(!chk.ok)continue;
    var gr=quickGrade(tk,key,subModeLabel,gp,'LONG');
    if(!gr||gr.grade==='F')continue;
    candidates.push({ticker:tk,key:key,grade:gr,q:q,caution:chk.caution});
  }
  var gradeOrder={A:0,B:1,C:2,F:3};
  candidates.sort(function(a,b){
    var gd=(gradeOrder[a.grade.grade]||3)-(gradeOrder[b.grade.grade]||3);
    if(gd!==0)return gd;
    return(parseFloat(b.q.conf)||0)-(parseFloat(a.q.conf)||0);
  });
  candidates=candidates.slice(0,8);
  if(!candidates.length){el.innerHTML='';return;}
  var h='<div class="tc-section"><div class="tc-hdr">🎯 Trade Candidates · '+e(subModeLabel||'GP-'+gp)+'</div>';
  for(var c=0;c<candidates.length;c++){
    var cd=candidates[c],q=cd.q;
    var chgN=q.chg?parseFloat(String(q.chg).replace('%','')):0;
    var chgCls=chgN>0?'g':chgN<0?'r':'dim';
    var rv=parseFloat(q.rvol)||0;var rvc=rv>=2?'g':rv>=1.5?'y':'dim';
    var cf=parseFloat(q.conf)||0;var cfc=cf>=28?'g':cf>=24?'y':'dim';
    var setupCls=cd.caution?'st-warn':'st-ok';
    var gradeCol=cd.grade.grade==='A'?'#00c853':cd.grade.grade==='B'?'#42a5f5':'#ff9800';
    h+='<div class="tc-card" onclick="openPT(\''+cd.ticker+'\')">';
    // Position indicator + Dynamic badge
    var isHeld=false;
    if(_lastD&&_lastD.positions)for(var ph=0;ph<_lastD.positions.length;ph++){if((_lastD.positions[ph].ticker||'')===cd.ticker)isHeld=true;}
    var isDynamic=_lastD&&_lastD.dynamicTickers&&_lastD.dynamicTickers[cd.ticker];
    h+='<span class="tc-tk">'+e(cd.ticker);
    if(isHeld)h+=' <span style="font-size:8px;color:#3fb950;vertical-align:middle">●</span>';
    if(isDynamic)h+=' <span style="font-size:8px;color:#ffc107;vertical-align:middle" title="Dynamic: '+e(isDynamic.source+' — '+isDynamic.reason)+'">⚡</span>';
    h+='</span>';
    h+='<span class="tc-setup '+setupCls+'">'+e(C_REGISTRY[cd.key].label)+'</span>';
    h+='<span class="tc-meta">';
    h+='<span class="'+chgCls+'">'+e(q.chg||'')+'</span>';
    h+=' <span class="'+rvc+'">RV '+rv.toFixed(1)+'</span>';
    h+=' <span class="'+cfc+'">⚡'+cf.toFixed(0)+'</span>';
    if(cd.grade.notes.length)h+=' <span class="dim">'+e(cd.grade.notes.slice(0,2).join(', '))+'</span>';
    h+='</span>';
    h+='<span class="tc-grade" style="color:'+gradeCol+'">'+cd.grade.grade+'</span>';
    h+='</div>';
  }
  h+='</div>';
  el.innerHTML=h;
}

// Match scanner setup string to registry key
function _matchSetupKey(s){
  if(!s)return null;
  s=s.toUpperCase();
  if(s.indexOf('VWAP')>=0)return 'VWAP-Hold';
  if(s.indexOf('OR-BREAK')>=0||s.indexOf('OR BREAK')>=0||s.indexOf('OPENING RANGE')>=0)return 'OR-Break';
  if(s.indexOf('PULLBACK')>=0&&s.indexOf('RETURN')<0)return 'Pullback-EMA';
  if(s.indexOf('RETURN')>=0||s.indexOf('RETPULL')>=0)return 'ReturnPullback';
  if(s.indexOf('MOMENTUM')>=0||s.indexOf('SPIKE')>=0)return 'Momentum';
  if(s.indexOf('FAILED')>=0||s.indexOf('FAIL-BD')>=0)return 'Failed-BD';
  if(s.indexOf('RS OVERRIDE')>=0||s.indexOf('RS-OVER')>=0)return 'RS-Override';
  if(s.indexOf('ROTATION')>=0||s.indexOf('SECTOR')>=0)return 'Rotation-ETF';
  if(s.indexOf('BOUNCE')>=0||s.indexOf('REVERSAL')>=0)return 'BigDogBounce';
  if(s.indexOf('BIG DOG')>=0||s.indexOf('BIGDOG')>=0||s.indexOf('CONSOL')>=0)return 'BigDog';
  if(s.indexOf('GAP')>=0)return 'GapGo';
  if(s.indexOf('DAILY')>=0||s.indexOf('BREAKOUT')>=0)return 'DailyBreakout';
  if(s.indexOf('OPEN')>=0&&s.indexOf('DRIVE')>=0)return 'OpeningDrive';
  if(s.indexOf('MARKET')>=0)return 'MarketPlay';
  if(s.indexOf('SECOND')>=0||s.indexOf('2ND')>=0)return 'SecondDay';
  if(s.indexOf('SCALP')>=0)return 'Scalping';
  return null;
}

// ═══ Render Active Setups Bar ═══
function rActiveSetups(d){
  var el=$('sActiveSetups');if(!el)return;
  var sm=d.gpSubMode,gp=d.gpLetter||'C';
  var subModeLabel=(sm&&sm.subMode)?sm.subMode:'';
  var sizAdj=(sm&&sm.sizingAdj)?sm.sizingAdj:'';
  if(!subModeLabel){el.innerHTML='';return;}

  var allowed=[],caution=[],blocked=[];
  var keys=Object.keys(C_REGISTRY);
  for(var i=0;i<keys.length;i++){
    var k=keys[i],chk=_cSGP(k,subModeLabel,gp);
    if(chk.ok&&!chk.caution)allowed.push({key:k,r:C_REGISTRY[k]});
    else if(chk.ok&&chk.caution)caution.push({key:k,r:C_REGISTRY[k]});
    else blocked.push({key:k,r:C_REGISTRY[k]});
  }

  // Count matching tickers per setup from quotes
  var setupCounts={};
  var tqKeys=Object.keys(_tq||{});
  for(var j=0;j<tqKeys.length;j++){
    var tq=_tq[tqKeys[j]];
    if(tq&&tq.setup){
      var mk=_matchSetupKey(tq.setup);
      if(mk){setupCounts[mk]=(setupCounts[mk]||0)+1;}
    }
  }

  var h='<div class="as-bar"><div class="as-hdr">Active Setups · '+e(subModeLabel);
  var hotSecs=d.hotSectors||[];
  for(var hs=0;hs<hotSecs.length;hs++)h+=' <span class="hot-pill">🔥 '+e(hotSecs[hs])+'</span>';
  h+='</div><div class="as-pills">';
  for(var a=0;a<allowed.length;a++){
    var ct=setupCounts[allowed[a].key]||0;
    h+='<span class="as-pill as-ok" title="'+e(allowed[a].r.nature)+' · RVOL≥'+allowed[a].r.minRVOL+'">'+e(allowed[a].r.label);
    if(ct>0)h+=' <span class="as-ct">'+ct+'</span>';

function initSparkTips(){
  document.querySelectorAll('span[data-ttinit]').forEach(function(sp){
    var id=sp.getAttribute('data-ttinit');
    var hit=document.getElementById(id+'hit');
    if(!hit||hit._tt)return;
    hit._tt=true;
    var pts=hit.getAttribute('data-pts').split('|').map(function(s){var p=s.split(',');return{px:+p[0],py:+p[1],v:+p[2],t:+p[3],gp:p[4]};});
    var W=+hit.getAttribute('data-w'),PR=+hit.getAttribute('data-pr'),PT=+hit.getAttribute('data-pt'),CH=+hit.getAttribute('data-ch');
    var vl=document.getElementById(id+'vl'),dt=document.getElementById(id+'dt'),bx=document.getElementById(id+'bx'),bg=document.getElementById(id+'bg'),t1=document.getElementById(id+'t1'),t2=document.getElementById(id+'t2');
    function gc(gp){return{A:'#3fb950',B:'#58a6ff',D:'#f85149'}[gp]||'#e3b341';}
    function hide(){vl.setAttribute('opacity','0');dt.setAttribute('opacity','0');bx.setAttribute('opacity','0');}
    hit.addEventListener('mousemove',function(e){
      // Convert mouse position to SVG viewBox coordinates
      var svg=hit.ownerSVGElement;
      var rect=svg.getBoundingClientRect();
      var scaleX=320/rect.width; // viewBox width=320
      var mx=(e.clientX-rect.left)*scaleX;
      // Find nearest point by x
      var best=pts[0],bestD=999;
      for(var i=0;i<pts.length;i++){var d=Math.abs(pts[i].px-mx);if(d<bestD){bestD=d;best=pts[i];}}
      var p=best,c=gc(p.gp);
      vl.setAttribute('x1',p.px);vl.setAttribute('x2',p.px);vl.setAttribute('opacity','1');
      dt.setAttribute('cx',p.px);dt.setAttribute('cy',p.py);dt.setAttribute('fill',c);dt.setAttribute('opacity','1');
      var dd=new Date(p.t),hr=dd.getHours(),mn=dd.getMinutes(),ap=hr>=12?'p':'a',h12=hr>12?hr-12:hr===0?12:hr;
      t1.textContent=(p.v>0?'+':'')+p.v.toFixed(1)+' GP-'+p.gp;t1.setAttribute('fill',c);
      t2.textContent=h12+':'+(mn<10?'0':'')+mn+ap;
      var bw=66,bh=30,bxv=p.px+6;if(bxv+bw>W-PR)bxv=p.px-bw-6;
      var byv=p.py-bh-5;if(byv<PT)byv=p.py+6;
      bg.setAttribute('x',bxv);bg.setAttribute('y',byv);
      t1.setAttribute('x',bxv+4);t1.setAttribute('y',byv+13);
      t2.setAttribute('x',bxv+4);t2.setAttribute('y',byv+25);
      bx.setAttribute('opacity','1');
    });
    hit.addEventListener('mouseleave',hide);
  });
}

// ═══ SHARED GP COLOR MAP ═══
var GP_COLOR={A:'#3fb950',B:'#58a6ff',C:'#e3b341',D:'#f85149'};
var GP_BG={A:'#0d2818',B:'#0d1a2e',C:'#1f1a0f',D:'#1f1315'};

// ═══ GAMEPLAN — horizontal timeline bar (like TradingView sidebar) ═══
function rGP(d){
  var gp=d.gpLetter||'C',sc=d.breadthScore||'—';
  var lab={A:'Hunt Mode · $15-20K',B:'Sniper Mode · $8-12K',C:'Selective · Check Sub-Mode',D:'Short Mode · Inverse ETFs'};
  var col=GP_COLOR[gp]||'#7d8590',bg=GP_BG[gp]||'#161b22';
  var h='<h2>Gameplan</h2><div class="gp-box" style="border-left:3px solid '+col+';border-radius:0 8px 8px 0;padding:12px 14px">';
  // Header row: tag + label
  h+='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
  h+='<span class="tag tag-gp" style="background:'+bg+';color:'+col+';border:1px solid '+col+'">GP-'+e(gp)+' · '+e(sc)+' pts · '+e(sL(d.phase))+'</span>';
  h+='<span class="white bold" style="font-size:13px">'+e(lab[gp])+'</span></div>';
  // Sub-mode badge with trajectory
  var sm=d.gpSubMode;
  if(sm&&sm.subMode){
    var traj=sm.trajectory||'Stable';
    var trajCls='tag-sub-stable',trajArr='→',trajAC='traj-flat';
    if(traj==='Improving'){trajCls='tag-sub-improving';trajArr='▲';trajAC='traj-up';}
    else if(traj==='Fading'){trajCls='tag-sub-fading';trajArr='▼';trajAC='traj-down';}
    else if(traj==='Choppy'){trajCls='tag-sub-choppy';trajArr='↔';trajAC='traj-chop';}
    h+='<div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">';
    h+='<span class="tag-sub '+trajCls+'">'+e(sm.subMode)+'</span>';
    h+='<span class="traj-arrow '+trajAC+'">'+trajArr+'</span>';
    // Sizing badge from SUBMODE_SIZING
    var sbInfo=_SIZE_BADGES[sm.sizingAdj];
    if(sbInfo)h+='<span class="size-badge '+sbInfo.cls+'">'+sbInfo.txt+'</span>';
    if(sm.desc)h+='<span class="dim" style="font-size:12px">'+e(sm.desc)+'</span>';
    h+='</div>';
    // Dynamic advisory from sizingAdj (replaces hardcoded lines)
    if(sm.sizingAdj==='reduce')h+='<p class="y" style="font-size:11px;margin-top:4px">⚠ Momentum fading — reduce new entries, tighten stops</p>';
    else if(sm.sizingAdj==='small')h+='<p style="color:#FF9800;font-size:11px;margin-top:4px">◉ C-Recovery: Tier 1-3 max ($3-5K), structure setups only</p>';
    else if(sm.sizingAdj==='bench')h+='<p class="dim" style="font-size:11px;margin-top:4px">◻ Bench — no setups available. RS Override or SIM only.</p>';
    else if(sm.sizingAdj==='caution')h+='<p class="y" style="font-size:11px;margin-top:4px">⚡ Choppy conditions — standard size but watch closely</p>';
    else if(sm.sizingAdj==='inverse')h+='<p style="color:#ab47bc;font-size:11px;margin-top:4px">◆ Inverse ETF mode — SOXS/TECS/SQQQ or Defiance singles</p>';
  }
  // SPY/QQQ/VIX line
  var bn=gS(d,'BENCHMARKS'),spy=fS(bn,'SPY'),qqq=fS(bn,'QQQ'),bd2=gS(d,'BREADTH DETAIL').concat(gS(d,'INTERNALS')),vix=fS(bd2,'$VIX');
  var mline='';if(spy)mline+='SPY '+e(spy.val)+' ('+pct(spy.chg)+') · ';if(qqq)mline+='QQQ '+e(qqq.val)+' ('+pct(qqq.chg)+') · ';if(vix)mline+='VIX '+e(vix.val);
  if(mline)h+='<p class="dim" style="font-size:12px;margin:6px 0 10px 0">'+mline+'</p>';
  // ── GP Timeline Bar — fixed 7am-2pm AZ window, Unix timestamps ──
  var hist=d.history||[];
  if(hist.length>0){
    var now=Date.now();
    var today=new Date();
    var utcMid=Date.UTC(today.getUTCFullYear(),today.getUTCMonth(),today.getUTCDate(),0,0,0);
    var tMin=utcMid+14*3600000;  // 7am AZ = UTC+7
    var tMax=utcMid+21*3600000;  // 2pm AZ = UTC+14
    if(now>tMax)tMax=now;
    var tRange=tMax-tMin||1;
    var TW=320,BAR_H=20,AXIS_H=14,PAD_L=4,PAD_R=4,plotW=TW-PAD_L-PAD_R;
    function gpX(t){return PAD_L+Math.max(0,Math.min(plotW,(t-tMin)/tRange*plotW));}
    var svg='<svg width="100%" viewBox="0 0 '+TW+' '+(BAR_H+AXIS_H)+'" style="display:block;margin:4px 0 2px 0;overflow:visible" xmlns="http://www.w3.org/2000/svg">';
    // Draw one rect per GP period: from entry[i].t to entry[i+1].t (or now for last)
    for(var i=0;i<hist.length;i++){
      var rg=hist[i].gp||'C',rc=GP_COLOR[rg]||'#7d8590',rbg=GP_BG[rg]||'#161b22';
      var x1=gpX(hist[i].t);
      var x2=(i<hist.length-1)?gpX(hist[i+1].t):gpX(now);
      var w=Math.max(1,x2-x1);
      var isLast=(i===hist.length-1);
      svg+='<rect x="'+x1.toFixed(1)+'" y="0" width="'+w.toFixed(1)+'" height="'+BAR_H+'" rx="2" fill="'+(isLast?rc:rbg)+'" stroke="'+rc+'" stroke-width="0.75" opacity="'+(isLast?1:0.8)+'"/>';
      if(w>16)svg+='<text x="'+(x1+w/2).toFixed(1)+'" y="'+(BAR_H/2+3.5)+'" text-anchor="middle" font-size="9" font-weight="700" font-family="JetBrains Mono,monospace" fill="'+(isLast?'#0b0e14':rc)+'">'+e(rg)+'</text>';
    }
    // Hardcoded AZ hour ticks: 7a 8a 9a 10a 11a 12p 1p 2p
    var azTicks=[{h:7,l:'7a'},{h:8,l:'8a'},{h:9,l:'9a'},{h:10,l:'10a'},{h:11,l:'11a'},{h:12,l:'12p'},{h:13,l:'1p'},{h:14,l:'2p'}];
    for(var ti=0;ti<azTicks.length;ti++){
      var hMs=utcMid+(azTicks[ti].h+7)*3600000;
      var tx=gpX(hMs);
      if(tx>PAD_L+4&&tx<TW-PAD_R-4){
        svg+='<line x1="'+tx.toFixed(1)+'" y1="'+BAR_H+'" x2="'+tx.toFixed(1)+'" y2="'+(BAR_H+4)+'" stroke="#30363d" stroke-width="1"/>';
        svg+='<text x="'+tx.toFixed(1)+'" y="'+(BAR_H+AXIS_H-1)+'" text-anchor="middle" font-size="8" fill="#484f58" font-family="JetBrains Mono,monospace">'+azTicks[ti].l+'</text>';
      }
    }
    // Current time marker
    var nowX=gpX(now);
    svg+='<line x1="'+nowX.toFixed(1)+'" y1="-2" x2="'+nowX.toFixed(1)+'" y2="'+(BAR_H+2)+'" stroke="#fff" stroke-width="1" opacity="0.4"/>';
    svg+='</svg>';
    h+=svg;
  }
  // Gameplan Status from Opus narrative
  var nar=d.dashboardNarrative||'',sec=parseN(nar);
  var gps=gN(sec,['GAMEPLAN STATUS','GAMEPLAN','GP STATUS']);
  if(gps){h+='<div style="margin-top:10px;padding-top:8px;border-top:1px solid #1c2333;font-size:13px;line-height:1.7"><span style="color:'+col+';font-weight:700;font-size:14px">GP-'+e(gp)+'</span> '+fmt(gps)+'</div>';}
  h+='</div>';$('sGP').innerHTML=h;
}

function rBrief(d){$('sBrief').innerHTML='';return;

  var gp=d.gpLetter||'C',sc=d.breadthScore!=null?parseFloat(d.breadthScore):0;
  var nar=d.dashboardNarrative||'',sec=parseN(nar);
  var ip=d.instPulse?d.instPulse.data:null;

  // 1. GAMEPLAN + VERDICT

  var gpLab={A:'Hunt Mode — full size, high conviction setups',B:'Sniper Mode — selective, reduced size',C:'Bench — sit on hands, no edge',D:'Short Mode — inverse ETFs or cash'}[gp]||'';
  // Trajectory from history
  var hist=d.history||[];
  var traj='';
  if(hist.length>=3){
    var recent=hist.slice(-3);
    var scores=recent.map(function(h){return parseFloat(h.v)||0;});
    if(scores[2]>scores[0]+1.5)traj='improving ↑';
    else if(scores[2]<scores[0]-1.5)traj='fading ↓';

  }
  h+='<div style="margin-bottom:8px">';

  if(story){

  }
  h+='</div>';
  
  // 2. REGIME CHECK
  if(ip){
    var vr=ip.vol_regime||{};
    h+='<div style="margin-bottom:8px;padding:6px 10px;background:#0d1117;border-radius:4px;border-left:3px solid #d29922">';
    h+='<span style="color:#d29922;font-weight:700;font-size:11px">REGIME</span> ';
    // VIX
    if(vr.vix!=null){
      var vx=parseFloat(vr.vix);
      var vc=vx>=30?'r':vx>=20?'y':'g';
      var vl=vx>=30?'Panic':vx>=25?'High Fear':vx>=20?'Elevated':vx>=15?'Normal':'Complacent';
      h+='<span class="'+vc+' mono">VIX '+vx.toFixed(1)+'</span> <span class="dim">('+vl+')</span> ';
    }
    // Term structure
    if(ip.term_structure){
      var ts=ip.term_structure;
      var tsState=ts.state||'';
      var tsc=tsState==='CONTANGO'?'g':tsState==='FLAT'?'y':tsState==='BACKWARDATION'?'r':'r';
      h+='· <span class="'+tsc+'">'+e(tsState)+'</span> ';
    }
    // SPY IVR
    if(vr.spy_ivr!=null)h+='· <span class="dim">SPY IVR '+parseFloat(vr.spy_ivr).toFixed(0)+'</span> ';
    // Sizing implication
    var sizeNote='';
    if(ip.term_structure&&(ip.term_structure.state==='BACKWARDATION'||ip.term_structure.state==='INVERTED'))sizeNote='⚠️ Reduce size, tighten stops';
    else if(vr.vix!=null&&parseFloat(vr.vix)>=25)sizeNote='⚠️ High vol — smaller positions, wider stops';
    else if(vr.spy_ivr!=null&&parseFloat(vr.spy_ivr)>=50)sizeNote='Elevated IVR — options expensive, consider spreads';
    else sizeNote='Normal regime — full GP sizing OK';
    h+='<div class="dim" style="margin-top:2px">→ '+sizeNote+'</div>';
    h+='</div>';
  }
  
  // 3. HOTTEST SETUP
  var wt=d.watchlistTop||[];
  if(wt.length){
    // Sort by confluence score descending
    var sorted=wt.slice().sort(function(a,b){return(parseFloat(b.confluence)||0)-(parseFloat(a.confluence)||0);});
    var top=sorted[0];
    if(top&&parseFloat(top.confluence)>0){

      h+='<div style="margin-bottom:8px;padding:6px 10px;background:#0d1117;border-radius:4px;border-left:3px solid #58a6ff">';

      if(top.setup)h+=' <span class="white">'+e(top.setup)+'</span>';
      if(top.quality)h+=' <span class="dim">Qual: '+e(top.quality)+'</span>';
      // Sector
      if(top.sector)h+='<div class="dim" style="margin-top:2px">'+e(top.sector)+'</div>';
      h+='</div>';
    }
  }
  
  // 4. CATALYST ALERT
  var econ=gS(d,'ECONOMIC CALENDAR');
  var earningsToday=d.earningsToday||[];
  var catItems=[];
  if(econ.length){
    for(var ei=0;ei<Math.min(econ.length,3);ei++){
      if(econ[ei].sym&&econ[ei].sym!=='Event')catItems.push(e(econ[ei].sym)+(econ[ei].val?' '+e(econ[ei].val):''));
    }
  }
  if(earningsToday.length){
    for(var eti=0;eti<Math.min(earningsToday.length,5);eti++){
      catItems.push('📊 '+e(earningsToday[eti].ticker||earningsToday[eti]));
    }
  }
  // Also check earnings from dedicated section
  var earnWeek=d.earningsWeek||[];
  if(!earningsToday.length&&earnWeek.length){
    for(var ewi=0;ewi<Math.min(earnWeek.length,3);ewi++){

    h+='<span class="dim">'+catItems.join(' · ')+'</span></div>';
  }
  
  // 5. ARETE SIGNAL
  var arP=d.aretePositions||[],arW=d.areteWatching||[];
  if(arP.length||arW.length){
    h+='<div style="margin-bottom:8px;padding:6px 10px;background:#0d1117;border-radius:4px;border-left:3px solid #e3b341">';
    h+='<span style="color:#e3b341;font-weight:700;font-size:11px">ARETE</span> ';
    // Summarize: count by tag

    for(var ap=0;ap<arP.length;ap++){var t=arP[ap].tag||'Other';tagCounts[t]=(tagCounts[t]||0)+1;}
    var tagParts=[];for(var tk2 in tagCounts)tagParts.push(tagCounts[tk2]+' '+tk2);
    h+='<span class="dim">'+tagParts.join(', ')+'</span>';
    if(arW.length)h+=' · <span class="dim">'+arW.length+' watching</span>';
    // Show top 3 arete tickers with change
    var arShow=arP.slice(0,3);
    var arTks=[];
    for(var as=0;as<arShow.length;as++){
      var atk=arShow[as].ticker;
      var aq=_tq[atk]||{};
      arTks.push(e(atk)+(aq.chg?' '+pct(aq.chg):''));
    }
    if(arTks.length)h+='<div style="margin-top:2px">'+arTks.join(' · ')+'</div>';
    h+='</div>';
  }
  
  // 6. SECTOR STORY
  var secs=gS(d,'GROWTH SECTORS').concat(gS(d,'DEFENSIVE SECTORS'));
  if(secs.length){
    var leaders=[],laggers=[];
    for(var si=0;si<secs.length;si++){
      var sv=parseFloat(String(secs[si].chg||'0').replace('%',''));
      if(!isNaN(sv)){
        if(sv>0.3)leaders.push({sym:secs[si].sym,chg:sv});
        else if(sv<-0.3)laggers.push({sym:secs[si].sym,chg:sv});
      }
    }
    leaders.sort(function(a,b){return b.chg-a.chg;});
    laggers.sort(function(a,b){return a.chg-b.chg;});
    if(leaders.length||laggers.length){
      h+='<div style="margin-bottom:8px;padding:6px 10px;background:#0d1117;border-radius:4px;border-left:3px solid #3fb950">';
      h+='<span style="color:#3fb950;font-weight:700;font-size:11px">SECTORS</span> ';
      if(leaders.length){
        h+='<span class="g">Leading:</span> ';
        h+='<span class="dim">'+leaders.slice(0,4).map(function(l){return e(l.sym)+' +'+l.chg.toFixed(1)+'%';}).join(', ')+'</span>';
      }
      if(leaders.length&&laggers.length)h+=' · ';
      if(laggers.length){
        h+='<span class="r">Lagging:</span> ';
        h+='<span class="dim">'+laggers.slice(0,4).map(function(l){return e(l.sym)+' '+l.chg.toFixed(1)+'%';}).join(', ')+'</span>';
      }
      h+='</div>';
    }
  }
  
  // 7. ONE THING — from narrative or synthesized
  var oneThing=gN(sec,['ONE THING','KEY TAKEAWAY','BOTTOM LINE','CRITICAL']);
  if(!oneThing){
    // Synthesize from data
    if(gp==='D')oneThing='Breadth negative — inverse ETFs or cash only. Protect capital.';
    else if(gp==='C')oneThing='No edge. Breadth flat. Wait for a clear signal before entering.';
    else if(ip&&ip.term_structure&&(ip.term_structure.state==='BACKWARDATION'||ip.term_structure.state==='INVERTED'))oneThing='VIX term structure warning — reduce size even on GP-'+gp+' setups.';
    else if(gp==='A'&&traj==='improving ↑')oneThing='Strong breadth and improving — lean into highest-conviction setups with full size.';
    else if(gp==='A'&&traj==='fading ↓')oneThing='GP-A but breadth fading — take profits on winners, tighten stops, don\'t add.';
    else if(gp==='B')oneThing='Selective mode — only A+ setups. Wait for breadth confirmation before new entries.';
  }
  if(oneThing){
    h+='<div style="padding:8px 10px;background:#1c2333;border-radius:4px;border:1px solid #30466e">';
    h+='<span style="font-size:13px">💡</span> <span style="color:#e6edf3;font-weight:600">'+fmt(oneThing)+'</span></div>';
  }
  
  h+='</div></div></div>';
  $('sBrief').innerHTML=h;
}

      // Also catch standalone tickers (2-5 caps preceded by space/newline)

// Helper: today's date in AZ
function _azToday(){
  var now=new Date();
  // AZ = UTC-7 always
  var az=new Date(now.getTime()-7*3600000);
  return az.getUTCFullYear()+'-'+String(az.getUTCMonth()+1).padStart(2,'0')+'-'+String(az.getUTCDate()).padStart(2,'0');
}

function rBreadth(d){
  var score=parseFloat(d.breadthScore)||0,hist=d.history||[];
  var cls=bCls(score),col=GP_COLOR[d.gpLetter||'C']||'#e3b341';
  var trend=score>=9.5?'▲ Strong':score>=3?'▲ Positive':score>=-3?'◆ Neutral':'▼ Negative';
  var h='<h2>Breadth</h2><div class="info-box" style="padding:12px 14px">';
  // Score + trend header
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';
  h+='<span style="font-family:\'JetBrains Mono\',monospace;font-size:26px;font-weight:700;color:'+col+'">'+score.toFixed(1)+'</span>';
  h+='<span class="dim" style="font-size:12px">Breadth Score<br><span style="color:'+col+';font-weight:700">'+trend+'</span></span>';
  h+='</div>';
  // ── SVG Sparkline — fixed 7am-2pm AZ window, Unix timestamps ──
  if(hist.length>1){
    var now2=Date.now();
    var today2=new Date();
    var utcMid2=Date.UTC(today2.getUTCFullYear(),today2.getUTCMonth(),today2.getUTCDate(),0,0,0);
    var tMin2=utcMid2+14*3600000;
    var tMax2=utcMid2+21*3600000;
    if(now2>tMax2)tMax2=now2;
    var tRange2=tMax2-tMin2||1;
    var W=320,H=80,PAD_L=28,PAD_R=6,PAD_T=6,PAD_B=18;
    var cW=W-PAD_L-PAD_R,cH=H-PAD_T-PAD_B;
    var vals=hist.map(function(x){return parseFloat(x.v)||0;});
    // Fixed V9 scale: -10 to +12 (covers all GP zones with headroom)
    var mn=-10,mx=12;
    var vRange=mx-mn;
    function bxT(t){return PAD_L+Math.max(0,Math.min(cW,(t-tMin2)/tRange2*cW));}
    function byV(v){return PAD_T+cH*(1-(v-mn)/vRange);}
    var svg='<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">';
    // Y-axis grid + labels — fixed ticks at V9 GP thresholds
    var yTicks=[-10,-5,0,5,9.5,12];
    var yLabels={'-10':'-10','-5':'-5','0':'0','5':'5','9.5':'9.5','12':'12'};
    for(var ti=0;ti<yTicks.length;ti++){
      var ty=byV(yTicks[ti]),isZ=yTicks[ti]===0,isGP=yTicks[ti]===9.5||yTicks[ti]===-3||yTicks[ti]===3;
      svg+='<line x1="'+PAD_L+'" y1="'+ty.toFixed(1)+'" x2="'+(W-PAD_R)+'" y2="'+ty.toFixed(1)+'" stroke="'+(isZ?'#30363d':'#1c2333')+'" stroke-width="'+(isZ?1.5:0.5)+'" stroke-dasharray="'+(isZ?'none':'2,3')+'"/>';
      svg+='<text x="'+(PAD_L-3)+'" y="'+(ty+3.5).toFixed(1)+'" text-anchor="end" font-size="8" fill="'+(isZ?'#7d8590':'#484f58')+'" font-family="JetBrains Mono,monospace">'+yTicks[ti]+'</text>';
    }
    // GP zone backgrounds
    svg+='<rect x="'+PAD_L+'" y="'+PAD_T+'" width="'+cW+'" height="'+(Math.max(0,byV(9.5)-PAD_T)).toFixed(1)+'" fill="#3fb950" opacity="0.04"/>';
    svg+='<rect x="'+PAD_L+'" y="'+byV(9.5).toFixed(1)+'" width="'+cW+'" height="'+(Math.max(0,byV(3)-byV(9.5))).toFixed(1)+'" fill="#58a6ff" opacity="0.03"/>';
    svg+='<rect x="'+PAD_L+'" y="'+byV(-3).toFixed(1)+'" width="'+cW+'" height="'+(Math.max(0,(PAD_T+cH)-byV(-3))).toFixed(1)+'" fill="#f85149" opacity="0.04"/>';
    // Area + line — colored per GP segment
    function gpC(gp){return{A:'#3fb950',B:'#58a6ff',D:'#f85149'}[gp]||'#e3b341';}
    // Draw area fills per segment (one closed path per GP zone group)
    var BASE=PAD_T+cH;
    var si=0;
    while(si<hist.length){
      var sgp=hist[si].gp||'C',sc2=gpC(sgp),sStart=si;
      while(si<hist.length&&(hist[si].gp||'C')===sgp)si++;
      var sEnd=si-1;
      if(sEnd>sStart){
        var ap2='M'+bxT(hist[sStart].t).toFixed(1)+','+byV(vals[sStart]).toFixed(1);
        for(var k=sStart+1;k<=sEnd;k++)ap2+=' L'+bxT(hist[k].t).toFixed(1)+','+byV(vals[k]).toFixed(1);
        ap2+=' L'+bxT(hist[sEnd].t).toFixed(1)+','+BASE+' L'+bxT(hist[sStart].t).toFixed(1)+','+BASE+' Z';
        svg+='<path d="'+ap2+'" fill="'+sc2+'" opacity="0.07"/>';
      }
    }
    // Draw line segments colored by GP
    for(var i=1;i<hist.length;i++){
      var sc=gpC(hist[i].gp||'C');
      var x1=bxT(hist[i-1].t).toFixed(1),y1=byV(vals[i-1]).toFixed(1);
      var x2=bxT(hist[i].t).toFixed(1),y2=byV(vals[i]).toFixed(1);
      svg+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+sc+'" stroke-width="1.8" stroke-linecap="round"/>';
    }
    // Current dot
    var ldx=bxT(hist[hist.length-1].t),ldy=byV(vals[vals.length-1]);
    svg+='<circle cx="'+ldx.toFixed(1)+'" cy="'+ldy.toFixed(1)+'" r="3" fill="'+col+'" stroke="#0b0e14" stroke-width="1.5"/>';
    // X-axis: hardcoded AZ hour ticks
    var azT2=[{h:7,l:'7a'},{h:9,l:'9a'},{h:10,l:'10a'},{h:11,l:'11a'},{h:12,l:'12p'},{h:13,l:'1p'},{h:14,l:'2p'}];
    for(var ti=0;ti<azT2.length;ti++){
      var hMs2=utcMid2+(azT2[ti].h+7)*3600000;
      var tx2=bxT(hMs2);
      if(tx2>=PAD_L&&tx2<=W-PAD_R){
        svg+='<line x1="'+tx2.toFixed(1)+'" y1="'+(PAD_T+cH)+'" x2="'+tx2.toFixed(1)+'" y2="'+(PAD_T+cH+3)+'" stroke="#30363d" stroke-width="1"/>';
        var xAnchor2=tx2<=PAD_L+8?'start':tx2>=W-PAD_R-8?'end':'middle';
        svg+='<text x="'+tx2.toFixed(1)+'" y="'+(H-2)+'" text-anchor="'+xAnchor2+'" font-size="8" fill="#484f58" font-family="JetBrains Mono,monospace">'+azT2[ti].l+'</text>';
      }
    }
    // Tooltip — mousemove on a transparent overlay rect, find nearest point
    var ttId='btt'+Math.floor(Date.now()%99999);
    var ttPts=[];
    for(var i=0;i<hist.length;i++) ttPts.push([parseFloat(bxT(hist[i].t).toFixed(2)),parseFloat(byV(vals[i]).toFixed(2)),vals[i],hist[i].t,hist[i].gp||'C']);
    // Encode points as pipe-delimited string in a data attribute
    var ptStr=ttPts.map(function(p){return p.join(',');}).join('|');
    // Full-area transparent hit rect
    svg+='<rect id="'+ttId+'hit" x="'+PAD_L+'" y="'+PAD_T+'" width="'+cW+'" height="'+cH+'" fill="transparent" style="cursor:crosshair"'
      +' data-pts="'+ptStr+'" data-w="'+W+'" data-pr="'+PAD_R+'" data-pt="'+PAD_T+'" data-ch="'+cH+'" data-id="'+ttId+'"/>';
    // Crosshair + dot + tooltip elements
    svg+='<line id="'+ttId+'vl" x1="0" y1="'+PAD_T+'" x2="0" y2="'+(PAD_T+cH)+'" stroke="#7d8590" stroke-width="0.5" stroke-dasharray="2,2" opacity="0" pointer-events="none"/>';
    svg+='<circle id="'+ttId+'dt" cx="0" cy="0" r="3.5" fill="#fff" stroke="#0b0e14" stroke-width="1.5" opacity="0" pointer-events="none"/>';
    svg+='<g id="'+ttId+'bx" opacity="0" pointer-events="none">'
      +'<rect id="'+ttId+'bg" x="0" y="0" width="66" height="30" rx="3" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>'
      +'<text id="'+ttId+'t1" x="4" y="13" font-size="9.5" font-weight="700" font-family="JetBrains Mono,monospace" fill="#e6edf3">--</text>'
      +'<text id="'+ttId+'t2" x="4" y="25" font-size="8" font-family="JetBrains Mono,monospace" fill="#7d8590">--</text>'
      +'</g>';
    svg+='</svg>';
    h+=svg;
    // Attach listener after DOM is ready using a unique marker
    h+='<span data-ttinit="'+ttId+'" style="display:none"></span>';
  }
  // ── Scoring Breakdown ──
  var bd=gS(d,'BREADTH DETAIL').concat(gS(d,'INTERNALS'));

  // Helper: find value from bd by sym
  function fBD(sym){for(var i=0;i<bd.length;i++){if(String(bd[i].sym||'').replace(/\s*\(scaled\)/gi,'').trim()===sym)return bd[i];}return null;}

  // ── 1. PRIMARY DRIVERS (client-side recalc for individual pts) ──
  function tickPts(v){return v>=700?2:v>=300?1:v<=-700?-2:v<=-300?-1:0;}
  function addPts(v){return v>=1000?2:v>=400?1:v<=-1000?-2:v<=-400?-1:0;}
  function adqdPts(v){return v>=1000?2:v>=500?1:v<=-1000?-2:v<=-500?-1:0;}
  function voldPts(v){return v>=700?2:v>=150?1:v<=-700?-2:v<=-150?-1:0;}
  function volqdPts(v){return v>=3500?2:v>=1500?1:v<=-3500?-2:v<=-1500?-1:0;}

  var primDefs=[
    {sym:'$TICK',  fn:tickPts},
    {sym:'$ADD',   fn:addPts},
    {sym:'$ADQD',  fn:adqdPts},
    {sym:'$VOLD',  fn:voldPts},
    {sym:'$VOLQD', fn:volqdPts}
  ];

  var primRows='',primTotal=0;
  for(var i=0;i<primDefs.length;i++){
    var it=fBD(primDefs[i].sym);
    var raw=it?String(it.val||''):'';
    var val=parseFloat(raw.replace(/[,]/g,''));
    if(isNaN(val)){
      primRows+='<tr><td class="white bold">'+sd(primDefs[i].sym)+'</td><td class="mono dim" style="text-align:right">N/A</td><td class="dim" style="text-align:right">—</td></tr>';
      continue;
    }
    var pts=primDefs[i].fn(val);
    primTotal+=pts;
    var vc=pts>0?'g':pts<0?'r':'dim';
    var pStr=(pts>0?'+':'')+pts;
    var dispVal=Math.abs(val)>100?String(Math.round(val)):val.toFixed(2);
    primRows+='<tr><td class="white bold">'+sd(primDefs[i].sym)+'</td><td class="mono '+(val>0?'g':val<0?'r':'dim')+'" style="text-align:right">'+dispVal+'</td><td class="'+vc+' bold mono" style="text-align:right">'+pStr+'</td></tr>';
  }

  // ── 2. REGIME MODIFIERS — VIX + HYG/TLT + BTC + ES/NQ ──
  var vixIt=fBD('$VIX');
  var vixVal=d.tsVix?parseFloat(d.tsVix):(vixIt?parseFloat(String(vixIt.val||'')):NaN);
  var vixPts=isNaN(vixVal)?0:vixVal<15?1:vixVal<=18?0.5:0;

  // HYG/TLT from INTERMARKET RATIOS
  var im=gS(d,'INTERMARKET RATIOS');
  function fIM(sym){for(var i=0;i<im.length;i++){if(String(im[i].sym||'').replace(/\s/g,'')===sym.replace(/\s/g,''))return im[i];}return null;}
  var hygIt=fIM('HYG/TLT');
  var hygRatio=hygIt?parseFloat(String(hygIt.val||'')):NaN;
  var hygPts=isNaN(hygRatio)?0:hygRatio>=0.95?1:hygRatio>=0.90?0.5:0;

  // BTC from COMMODITIES
  var comm2=gS(d,'COMMODITIES');
  function fComm(sym){for(var i=0;i<comm2.length;i++){if(String(comm2[i].sym||'').indexOf(sym)>=0)return comm2[i];}return null;}
  var btcIt=fComm('BTC');
  var btcVal=btcIt?parseFloat(String(btcIt.val||'').replace(/[,]/g,'')):NaN;
  var btcPts=isNaN(btcVal)?0:btcVal>=95000?1:btcVal>=90000?0.5:0;

  // ES/NQ from futures
  var fut=gS(d,'FUTURES');
  function fFut(s){for(var i=0;i<fut.length;i++){if(String(fut[i].sym||'').indexOf(s)>=0)return fut[i];}return null;}
  var esIt=fFut('ES'),nqIt=fFut('NQ');
  var esPos=esIt?(parseFloat(String(esIt.chg||'').replace(/[%,]/g,''))||0)>0:false;
  var nqPos=nqIt?(parseFloat(String(nqIt.chg||'').replace(/[%,]/g,''))||0)>0:false;
  var futurePts=(esPos&&nqPos)?0.5:0;

  var regimeTotal=vixPts+hygPts+btcPts+futurePts;

  var regimeRows='';
  function regRow(label,dispVal,pts,valCls){
    var vc=pts>0?'g':'dim';
    var pStr=pts>0?'+'+pts:'0';
    regimeRows+='<tr><td class="white bold">'+label+'</td>'
      +'<td class="mono '+(valCls||'dim')+'" style="text-align:right">'+dispVal+'</td>'
      +'<td class="'+vc+' bold mono" style="text-align:right">'+pStr+'</td></tr>';
  }
  regRow('VIX', isNaN(vixVal)?'N/A':vixVal.toFixed(1), vixPts, vixVal<15?'g':vixVal<=18?'y':'r');
  regRow('HYG/TLT', isNaN(hygRatio)?'N/A':hygRatio.toFixed(4), hygPts, hygRatio>=0.95?'g':hygRatio>=0.90?'y':'r');
  regRow('BTC', isNaN(btcVal)?'N/A':Math.round(btcVal/1000)+'K', btcPts, btcVal>=95000?'g':btcVal>=90000?'y':'r');
  regRow('ES/NQ', (esPos?'▲':'▼')+'/'+(nqPos?'▲':'▼'), futurePts, (esPos&&nqPos)?'g':'dim');

  // ── 3. SECTOR PARTICIPATION — use scanner's sectorPts directly ──
  var sectorPts=parseFloat(d.sectorPts)||0;
  var growthGreen=0,defGreen=0;

  if(!_ptCandidateList.length)_buildCandidateList();
  _ptCurrentIdx=-1;
  for(var i=0;i<_ptCandidateList.length;i++){if(_ptCandidateList[i]===symbol){_ptCurrentIdx=i;break;}}
  _loadPTModal(symbol);
}

function _buildCandidateList(){
  var sm=_lastD?_lastD.gpSubMode:null;var gp=(_lastD&&_lastD.gpLetter)||'C';
  var subModeLabel=(sm&&sm.subMode)?sm.subMode:'';
  var tqKeys=Object.keys(_tq||{});var cands=[];
  for(var i=0;i<tqKeys.length;i++){
    var tk=tqKeys[i],q=_tq[tk];
    if(!q||!q.setup||!q.last||tk.charAt(0)==='$')continue;
    var key=_matchSetupKey(q.setup);if(!key)continue;
    var chk=_cSGP(key,subModeLabel,gp);if(!chk.ok)continue;
    var gr=quickGrade(tk,key,subModeLabel,gp,'LONG');
    if(!gr||gr.grade==='F')continue;
    cands.push({ticker:tk,grade:gr.grade,conf:parseFloat(q.conf)||0});
  }
  var go={A:0,B:1,C:2};
  cands.sort(function(a,b){var gd=(go[a.grade]||3)-(go[b.grade]||3);return gd!==0?gd:b.conf-a.conf;});
  _ptCandidateList=cands.map(function(c){return c.ticker;});
}

function ptNav(dir){
  if(!_ptCandidateList.length)return;
  var newIdx=_ptCurrentIdx+dir;
  if(newIdx<0)newIdx=_ptCandidateList.length-1;
  if(newIdx>=_ptCandidateList.length)newIdx=0;
  _ptCurrentIdx=newIdx;
  _loadPTModal(_ptCandidateList[newIdx]);
}

function _loadPTModal(symbol){
  var ov=$('ptOverlay');ov.classList.add('open');
  var countTxt=_ptCandidateList.length>0?' <span class="dim" style="font-size:11px">'+(_ptCurrentIdx+1)+'/'+_ptCandidateList.length+'</span>':'';
  $('ptTitle').innerHTML='<span style="cursor:pointer;padding:4px 8px;border-radius:4px;margin-right:6px" onclick="ptNav(-1)" title="Previous">◀</span>'+e(symbol)+countTxt+'<span style="cursor:pointer;padding:4px 8px;border-radius:4px;margin-left:6px" onclick="ptNav(1)" title="Next">▶</span>';
  $('ptBody').innerHTML='<div class="pt-loading">Loading '+e(symbol)+'...</div>';
  fetch(EP+'?mode=pretrade&symbol='+encodeURIComponent(symbol)+'&t='+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){
      _ptData=d;
      if(d.error){$('ptBody').innerHTML='<div class="pt-loading" style="color:#ef5350">'+e(d.error)+'</div>';return;}
      renderPTModal(d);
    })
    .catch(function(err){$('ptBody').innerHTML='<div class="pt-loading" style="color:#ef5350">Error: '+e(err.message)+'</div>';});
}

function closePT(){$('ptOverlay').classList.remove('open');_ptData=null;}

// Keyboard nav: ← → arrows when modal is open, Escape to close
document.addEventListener('keydown',function(ev){
  if(!$('ptOverlay').classList.contains('open'))return;
  if(ev.key==='ArrowLeft'){ev.preventDefault();ptNav(-1);}
  else if(ev.key==='ArrowRight'){ev.preventDefault();ptNav(1);}
  else if(ev.key==='Escape')closePT();
});

// Client-side scorecard checks (mirrors v90.9 evaluateScorecard Check 1)
function buildScorecardHTML(d,setupKey,side){
  var h='<div class="pt-label">Scorecard</div>';
  var checks=[];
  var subM=d.gpSubMode||'';var gpl=d.gameplan||'C';
  var reg=C_REGISTRY[setupKey]||{};

  // Check 1: GP × Setup validity
  var c1=_cSGP(setupKey,subM,gpl);
  if(side==='LONG'){
    if(c1.ok&&!c1.caution)checks.push({name:'GP × Setup',val:'GREEN',cls:'chk-g',tip:c1.reason});
    else if(c1.ok&&c1.caution)checks.push({name:'GP × Setup',val:'YELLOW',cls:'chk-y',tip:c1.reason});
    else checks.push({name:'GP × Setup',val:'RED',cls:'chk-r',tip:c1.reason});
  } else {
    var sc=gpl==='D'?'GREEN':gpl==='C'?'YELLOW':'RED';
    var scl=sc==='GREEN'?'chk-g':sc==='YELLOW'?'chk-y':'chk-r';
    checks.push({name:'GP × Short',val:sc,cls:scl,tip:'GP-'+gpl+' for shorts'});
  }

  // Check 2: RVOL
  var rvN=parseFloat(d.rvol)||0;
  var rvReq=reg.minRVOL||1;
  if(rvN>=rvReq)checks.push({name:'RVOL ≥'+rvReq,val:'GREEN',cls:'chk-g',tip:rvN.toFixed(1)+'x'});
  else if(rvN>=rvReq*0.7)checks.push({name:'RVOL ≥'+rvReq,val:'YELLOW',cls:'chk-y',tip:rvN.toFixed(1)+'x (close)'});
  else checks.push({name:'RVOL ≥'+rvReq,val:'RED',cls:'chk-r',tip:rvN.toFixed(1)+'x (need '+rvReq+')'});

  // Check 3: VWAP
  var vd=d.vwapDist||0;
  if(side==='LONG'){
    if(vd>0)checks.push({name:'Above VWAP',val:'GREEN',cls:'chk-g',tip:'+'+vd.toFixed(2)+'%'});
    else if(vd>-0.3)checks.push({name:'Above VWAP',val:'YELLOW',cls:'chk-y',tip:vd.toFixed(2)+'%'});
    else checks.push({name:'Above VWAP',val:'RED',cls:'chk-r',tip:vd.toFixed(2)+'%'});
  } else {
    if(vd<0)checks.push({name:'Below VWAP',val:'GREEN',cls:'chk-g',tip:vd.toFixed(2)+'%'});
    else if(vd<0.3)checks.push({name:'Below VWAP',val:'YELLOW',cls:'chk-y',tip:'+'+vd.toFixed(2)+'%'});
    else checks.push({name:'Below VWAP',val:'RED',cls:'chk-r',tip:'+'+vd.toFixed(2)+'%'});
  }

  // Check 4: Confluence
  var cf=d.conf||0;
  if(cf>=24)checks.push({name:'Confluence',val:'GREEN',cls:'chk-g',tip:cf+'/38'});
  else if(cf>=20)checks.push({name:'Confluence',val:'YELLOW',cls:'chk-y',tip:cf+'/38'});
  else checks.push({name:'Confluence',val:'RED',cls:'chk-r',tip:cf+'/38'});

  // Check 5: Session
  var phase=d.sessionPhase||'';
  var sess=reg.sessions||['OPEN','CORE'];
  var phMap={'PRE-MARKET':'PRE','OPEN':'OPEN','CORE':'CORE','POWER':'POWER','AFTER-HOURS':'AFTER'};
  var curSess=phMap[phase]||'CORE';
  if(sess.indexOf(curSess)>=0||sess.indexOf(phase)>=0)checks.push({name:'Session',val:'GREEN',cls:'chk-g',tip:phase});
  else checks.push({name:'Session',val:'YELLOW',cls:'chk-y',tip:phase+' (prefer '+sess.join('/')+')'});

  // Check 6: VIX Regime
  var vr=d.vixRegime||'Normal';
  if(vr==='Low'||vr==='Normal')checks.push({name:'VIX Regime',val:'GREEN',cls:'chk-g',tip:d.vix+' ('+vr+')'});
  else if(vr==='Elevated')checks.push({name:'VIX Regime',val:'YELLOW',cls:'chk-y',tip:d.vix+' ('+vr+')'});
  else checks.push({name:'VIX Regime',val:'RED',cls:'chk-r',tip:d.vix+' ('+vr+')'});

  // Check 7: Sector correlation
  var sec=d.sector||'';
  var openCount=0;if(d.openTrades)for(var t=0;t<d.openTrades.length;t++){if(d.openTrades[t].sector===sec)openCount++;}
  if(openCount===0)checks.push({name:'Sector Exp',val:'GREEN',cls:'chk-g',tip:'No overlap'});
  else if(openCount===1)checks.push({name:'Sector Exp',val:'YELLOW',cls:'chk-y',tip:openCount+' open in '+sec});
  else checks.push({name:'Sector Exp',val:'RED',cls:'chk-r',tip:openCount+' open in '+sec});

  // Check 8: RSI
  var rsiN=parseFloat(d.rsi)||50;
  if(side==='LONG'){
    if(rsiN>=35&&rsiN<=70)checks.push({name:'RSI Range',val:'GREEN',cls:'chk-g',tip:rsiN.toFixed(0)});
    else if(rsiN>=25&&rsiN<=80)checks.push({name:'RSI Range',val:'YELLOW',cls:'chk-y',tip:rsiN.toFixed(0)});
    else checks.push({name:'RSI Range',val:'RED',cls:'chk-r',tip:rsiN.toFixed(0)+' (extreme)'});
  } else {
    if(rsiN>=30&&rsiN<=65)checks.push({name:'RSI Range',val:'GREEN',cls:'chk-g',tip:rsiN.toFixed(0)});
    else if(rsiN>=20&&rsiN<=75)checks.push({name:'RSI Range',val:'YELLOW',cls:'chk-y',tip:rsiN.toFixed(0)});
    else checks.push({name:'RSI Range',val:'RED',cls:'chk-r',tip:rsiN.toFixed(0)+' (extreme)'});
  }

  // Render
  var gC=0,yC=0,rC=0;
  h+='<div class="pt-checks">';
  for(var i=0;i<checks.length;i++){
    var ck=checks[i];
    if(ck.val==='GREEN')gC++;else if(ck.val==='YELLOW')yC++;else rC++;
    h+='<div class="pt-chk" title="'+e(ck.tip)+'"><span class="chk-name">'+e(ck.name)+'</span><span class="chk-val '+ck.cls+'">'+ck.val+'</span></div>';
  }
  h+='</div>';
  // Pass bar
  var total=checks.length;var passN=gC+yC;
  var pctG=gC/total*100,pctY=yC/total*100;
  var passCol=gC>=6?'#00c853':passN>=6?'#ffc107':'#ef5350';
  h+='<div class="pt-pass-bar"><div class="pt-pass-fill" style="width:'+((gC+yC)/total*100).toFixed(0)+'%;background:'+passCol+'"></div></div>';
  h+='<div style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-size:12px;color:'+passCol+'">'+gC+' GREEN · '+yC+' YELLOW · '+rC+' RED — '+(passN>=6?'PASS':'FAIL')+' ('+passN+'/'+total+')</div>';
  // Guidance engine
  h+=buildGuidanceHTML(checks,setupKey,(_ptData&&_ptData.gpSizingAdj)||'');
  return h;
}

// Re-run scorecard when setup or side changes
function ptUpdateSC(){
  if(!_ptData)return;
  var setup=$('ptSetup').value;
  var side=$('ptSide').value;
  var sec=$('ptSCSection');
  if(sec)sec.innerHTML=buildScorecardHTML(_ptData,setup,side);
  var pb=$('ptPlaybook');if(pb)pb.innerHTML=buildPlaybookHTML(setup);
  // Recalculate suggested stop/target for new setup type
  var reg=C_REGISTRY[setup]||{};
  var d=_ptData;
  var atr=d.atr||1;
  var entry=parseFloat($('ptEntry').value)||d.last;
  var stopDist=atr*(reg.stopATR||0.15);
  var newStop=Math.round((entry-stopDist)*100)/100;
  // Smart stop logic
  if(d.vwap>0&&d.vwap<entry&&d.vwap>newStop){newStop=Math.round((d.vwap-0.05)*100)/100;}
  if(d.orLo>0&&d.orLo<entry&&d.orLo>newStop&&(setup==='Failed-BD'||setup==='OR-Break')){newStop=Math.round((d.orLo-0.05)*100)/100;}
  if(d.ema20>0&&d.ema20<entry&&d.ema20>newStop&&setup==='Pullback-EMA'){newStop=Math.round((d.ema20-atr*0.10)*100)/100;}
  var risk=Math.abs(entry-newStop);
  var newTarget=Math.round((entry+risk*(reg.rr||3))*100)/100;
  $('ptStop').value=newStop.toFixed(2);
  $('ptTarget').value=newTarget.toFixed(2);
  ptCalcSize();
}

// ── SCORECARD GUIDANCE ENGINE ──
// Reads the check results and generates contextual advice
function buildGuidanceHTML(checks,setupKey,sizingAdj){
  var reds=[],yellows=[];
  for(var i=0;i<checks.length;i++){
    if(checks[i].val==='RED')reds.push(checks[i]);
    else if(checks[i].val==='YELLOW')yellows.push(checks[i]);
  }
  var h='<div style="margin-top:10px;padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.6;';
  if(reds.length>=3)h+='background:#1a0d0d;border:1px solid #da3633;color:#f0a0a0">';
  else if(reds.length>=2)h+='background:#1a0d00;border:1px solid #da3633;color:#f0a0a0">';
  else if(reds.length>=1||yellows.length>=2)h+='background:#1a1500;border:1px solid #9e6a03;color:#e3c87d">';
  else h+='background:#0d1a0d;border:1px solid #238636;color:#7ee787">';

  if(reds.length>=3){
    h+='<b style="color:#ef5350">⛔ DO NOT TRADE.</b> '+reds.length+' checks failed. Wait for conditions to improve.';
  } else if(reds.length===0&&yellows.length===0){
    h+='<b style="color:#00c853">✅ Full green light.</b> Execute with confidence at full size.';
  } else if(reds.length===0&&yellows.length<=1){
    h+='<b style="color:#00c853">✓ Strong setup.</b> ';
    if(yellows.length===1)h+=_shortAdvice(yellows[0]);
    h+='<div style="margin-top:3px"><b>Sizing:</b> Full base.</div>';
  } else {
    // Build concise issue list — max 2 most important
    var issues=[];
    for(var ri=0;ri<Math.min(reds.length,2);ri++)issues.push(_shortAdvice(reds[ri]));
    if(issues.length<2)for(var yi=0;yi<Math.min(yellows.length,2-issues.length);yi++)issues.push(_shortAdvice(yellows[yi]));

    if(reds.length>=2){
      h+='<b style="color:#ef5350">⚠️ Weak — consider passing.</b> ';
    } else if(reds.length===1){
      h+='<b style="color:#ffc107">△ Reduced conviction.</b> ';
    } else {
      h+='<b style="color:#e3b341">✓ Pass with notes.</b> ';
    }
    h+=issues.join(' ');
    // Sizing directive
    if(reds.length>=2)h+='<div style="margin-top:3px"><b>Sizing:</b> Pass or wait for improvement.</div>';
    else if(reds.length===1)h+='<div style="margin-top:3px"><b>Sizing:</b> Half base, Tier 1 only. Add only if the RED flips.</div>';
    else h+='<div style="margin-top:3px"><b>Sizing:</b> 75% base. Tighter stops.</div>';
  }
  h+='</div>';return h;
}
function _shortAdvice(chk){
  var n=chk.name||'';
  if(n.indexOf('RVOL')>=0)return chk.val==='RED'?'RVOL too low — no institutional volume.':'RVOL borderline — wait for volume or starter size.';
  if(n.indexOf('VWAP')>=0)return chk.val==='RED'?'Wrong side of VWAP — wait for reclaim.':'Near VWAP — wait for decisive move.';
  if(n.indexOf('Confluence')>=0)return chk.val==='RED'?'Low confluence — not enough signals stacking.':'Confluence in Playbook tier — needs checklist.';
  if(n.indexOf('GP')>=0)return chk.val==='RED'?'Setup blocked for current GP.':'GP caution — reduced size per sub-mode.';
  if(n.indexOf('Sector')>=0)return chk.val==='RED'?'Too much sector exposure — adding concentrates risk.':'One open in sector — watch total exposure.';
  if(n.indexOf('RSI')>=0)return 'RSI at extreme — overextended for entry.';
  if(n.indexOf('VIX')>=0)return chk.val==='RED'?'High VIX — reduce size 25%, wider stops.':'VIX elevated — wider expected moves.';
  if(n.indexOf('Session')>=0)return 'Not ideal session for this setup.';
  return '';
}

// Shared sizing calculation renderer
function _buildSizingHTML(entry,stop,target,reg,sizing,sizingAdj){
  if(!entry||!stop)return '<div class="pt-sz-row"><span class="lbl">Enter stop to calculate sizing</span></div>';
  var risk=Math.abs(entry-stop);
  if(risk<=0)return '<div class="pt-sz-row"><span class="lbl">Stop must differ from entry</span></div>';

  var midBase=(sizing.baseLo+sizing.baseHi)/2;
  var shares=Math.floor(midBase/entry);
  var dollarRisk=shares*risk;
  var rr=target>0?((Math.abs(target-entry))/risk):0;
  var rrCls=rr>=3?'g':rr>=2?'y':'r';
  var r1=(entry+risk).toFixed(2),r2=(entry+risk*2).toFixed(2),r3=(entry+risk*3).toFixed(2);

  var h='';
  h+='<div class="pt-sz-row"><span class="lbl">Shares</span><span class="val">'+shares+' sh · $'+(shares*entry).toFixed(0)+'</span></div>';
  h+='<div class="pt-sz-row"><span class="lbl">$ Risk</span><span class="val r">−$'+dollarRisk.toFixed(0)+' ('+risk.toFixed(2)+'/sh)</span></div>';
  if(target>0){
    h+='<div class="pt-sz-row"><span class="lbl">R:R</span><span class="val '+rrCls+'">'+rr.toFixed(1)+':1</span></div>';
    var profit=shares*Math.abs(target-entry);
    h+='<div class="pt-sz-row"><span class="lbl">Target P&L</span><span class="val g">+$'+profit.toFixed(0)+' at $'+target.toFixed(2)+'</span></div>';
  }
  h+='<div class="pt-sz-row"><span class="lbl">R-Levels</span><span class="val dim" style="font-size:10px">1R $'+r1+' · 2R $'+r2+' · 3R $'+r3+'</span></div>';
  h+='<div style="margin-top:6px;font-size:10px;color:#6e7590">Base: $'+sizing.baseLo+'–$'+sizing.baseHi+' ('+e(sizingAdj)+') · '+e(reg.scale||'')+'</div>';
  return h;
}

  $('foot').innerHTML='THE SYSTEM PROTECTS YOU. FOLLOW IT.<br><small>V9 Dashboard v11.16 · '+sL(d.phase)+' · GP-'+(d.gpLetter||'C')+fSm+(d._timing?' · <span class="dim">'+e(d._timing)+'</span>':'')+mdl+'</small>';
}

function parseN(t){var s={},l=t.split('\n'),k='',b=[];for(var i=0;i<l.length;i++){var li=l[i],m=li.match(/^#{1,3}\s*\**\s*(?:\d+[\.\)]\s*)?(.+?)\s*\**\s*$/);if(m){if(k)s[k]=b.join('\n').trim();k=m[1].toUpperCase().replace(/[:#*_]/g,'').replace(/\s+/g,' ').trim();b=[];}else b.push(li);}if(k)s[k]=b.join('\n').trim();return s;}
function gN(sec,keys){for(var i=0;i<keys.length;i++){var v=sec[keys[i]];if(v)return v;}
  // Fuzzy match: check if any sec key CONTAINS any of our search keys
  var sk=Object.keys(sec);for(var i=0;i<keys.length;i++){for(var j=0;j<sk.length;j++){if(sk[j].indexOf(keys[i])>=0||keys[i].indexOf(sk[j])>=0){if(sec[sk[j]])return sec[sk[j]];}}}return'';}
function fmt(t){if(!t)return'';var h=e(t);h=h.replace(/\*{0,2}\$([A-Z]{1,5})\*{0,2}/g,function(m,tk){var sl=_icSlugs[tk],iu=sl?'https://www.investing.com'+sl:'https://www.investing.com/search/?q='+encodeURIComponent(tk),tu='https://www.tradingview.com/chart/?symbol='+tk;return'<span style="display:inline-flex;align-items:center"><a href="'+tu+'" title="TV"><span class="tv-d"></span></a><a href="'+iu+'" target="_blank" class="ic-lnk">'+tk+'</a></span>';});h=h.replace(/\*\*(.+?)\*\*/g,'<span class="white bold">$1</span>');h=h.replace(/\n/g,'<br>');return h;}

// ── v90.3: Off-hours polling gate ──
// AZ = UTC-7 (no DST). Market-relevant: ~6:15am-4:15pm AZ weekdays.
function isAZMarketHours(){
  var now=new Date();
  var utc=now.getTime()+now.getTimezoneOffset()*60000;
  var az=new Date(utc-7*3600000);
  var dow=az.getDay();
  if(dow===0||dow===6)return false;
  var azMin=az.getHours()*60+az.getMinutes();
  return azMin>=375&&azMin<=975;
}
var _offHoursShown=false;
var _initialFetchDone=false;
var _origPoll=poll;
poll=function(){
  if(!isAZMarketHours()){
    // Always do one initial fetch to load cached data
    if(!_initialFetchDone){
      _initialFetchDone=true;
      _origPoll();
    }
    if(!_offHoursShown){
      _offHoursShown=true;
      setTimeout(function(){
        var st=$('st');if(st)st.textContent='Off-Hours (cached)';
        var pl=$('pl');if(pl)pl.className='pulse pulse-off';
      },3000);
    }
    return;
  }
  _offHoursShown=false;
  _initialFetchDone=true;
  _origPoll();
};
poll();setInterval(poll,60000);
window.addEventListener('scroll',function(){var b=document.getElementById('backToTop');if(b)b.style.display=window.scrollY>300?'flex':'none';});
// Card focus: click any pos-block to highlight it white, click again to unhighlight
var _focusedTickers=(function(){try{var s=localStorage.getItem('v9_card_focus');return s?new Set(JSON.parse(s)):new Set();}catch(e){return new Set();}})();
function saveFocused(){try{localStorage.setItem('v9_card_focus',JSON.stringify(Array.from(_focusedTickers)));}catch(e){}}
function reapplyFocus(){
  document.querySelectorAll('.pos-block').forEach(function(card){
    var link=card.querySelector('a[data-tk]');
    if(link&&_focusedTickers.has(link.getAttribute('data-tk')))card.classList.add('card-focus');
  });
}
document.addEventListener('click',function(ev){
  var card=ev.target.closest('.pos-block');
  if(!card)return;
  if(ev.target.closest('a,button'))return;
  var link=card.querySelector('a[data-tk]');
  if(!link)return;
  var tk=link.getAttribute('data-tk');
  card.classList.toggle('card-focus');
  if(card.classList.contains('card-focus')){_focusedTickers.add(tk);}else{_focusedTickers.delete(tk);}
  saveFocused();
});
</script>
